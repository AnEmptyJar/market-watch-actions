name: Market Push 10min

on:
  workflow_dispatch:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'

jobs:
  run-market-watch:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare runtime directories
        run: |
          mkdir -p logs state config

      - name: Create runtime config
        run: |
          cat > config/config.json <<'JSON'
          {
            "telegram": {
              "cooldown_sec": 600
            },
            "http": {
              "timeout_sec": 8,
              "retries": 2
            },
            "perf": {
              "concurrent_workers": 6
            },
            "fx_cache": {
              "ttl_sec": 43200
            },
            "alerts": {
              "major_pct": 3.0,
              "cooldown_sec": 900
            },
            "network": {
              "expected_exit_ip": "",
              "vps_host": "",
              "vps_port": 8443,
              "tcp_timeout_sec": 2.5
            },
            "schedule": {
              "day_start": "06:00:00",
              "day_end": "22:00:00"
            },
            "thresholds": {
              "night_major_pct": 3.0
            }
          }
          JSON

      - name: Run market watch once
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/market_watch_once.py

      - name: Show log tail
        if: always()
        run: |
          echo "===== market_watch.log ====="
          tail -n 50 logs/market_watch.log || true

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-hourly-runtime
          path: |
            logs/market_watch.log
            state/market_watch_state.json
          if-no-files-found: ignore
